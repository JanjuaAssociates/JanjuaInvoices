<script type="text/babel">
const { useState, useRef } = React;

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const pad=n=>String(n).padStart(2,"0");
const todayStr=()=>{const d=new Date();return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;};
const ordinal=n=>n+(n===1?"st":n===2?"nd":n===3?"rd":"th");
const fmt=n=>Number(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const uid=()=>Math.random().toString(36).slice(2,9);

// Get UK financial year string from a date e.g. "2025/26"
function getFY(date){
  const d=date||new Date();
  const y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
  // UK FY starts April 6
  const inNewFY=(m>3)||(m===3&&day>=6);
  const startYear=inNewFY?y:y-1;
  return `${startYear}/${String(startYear+1).slice(2)}`;
}
function formatPeriodDate(d){
  return `${ordinal(d.getDate())} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
// Advance period by 1 month or 1 quarter
function advancePeriod(periodStart,periodEnd,frequency){
  const s=parseDate(periodStart),e=parseDate(periodEnd);
  if(!s||!e) return null;
  const m=frequency==="quarterly"?3:1;
  const newStart=new Date(s.getFullYear(),s.getMonth()+m,1);
  const newEnd=new Date(newStart.getFullYear(),newStart.getMonth()+1,0); // last day of that month
  return {
    periodStart:formatPeriodDate(newStart),
    periodEnd:formatPeriodDate(newEnd),
  };
}
// Is an invoice overdue (unpaid and past its due date)?
function isOverdue(inv){
  if(inv.paid) return false;
  const due=parseDate(inv.paymentDue)||parseDate(inv.periodEnd);
  if(!due) return false;
  return new Date()>due;
}

/* ── Date utilities ── */
const MONTH_MAP={"january":0,"february":1,"march":2,"april":3,"may":4,"june":5,"july":6,"august":7,"september":8,"october":9,"november":10,"december":11};
// Parse "1st January 2026" or "DD/MM/YYYY" → Date object, or null
function parseDate(str){
  if(!str) return null;
  str=str.trim();
  // DD/MM/YYYY
  const dmy=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(dmy) return new Date(Number(dmy[3]),Number(dmy[2])-1,Number(dmy[1]));
  // "1st January 2026" style
  const wordy=str.match(/^(\d{1,2})\w*\s+(\w+)\s+(\d{4})$/i);
  if(wordy){
    const m=MONTH_MAP[wordy[2].toLowerCase()];
    if(m!==undefined) return new Date(Number(wordy[3]),m,Number(wordy[1]));
  }
  return null;
}

// Classify a single payment: "early" | "ontime" | "late" | "unpaid"
// early = paid before due date, ontime = paid on/within 3 days of due, late = paid after due
function classifyPayment(inv){
  if(!inv.paid) return "unpaid";
  const paid=parseDate(inv.paidDate);
  if(!paid) return "ontime";
  // Use paymentDue if available, otherwise fall back to periodStart
  const due=parseDate(inv.paymentDue)||parseDate(inv.periodStart);
  if(!due) return "ontime";
  const diffDays=(paid-due)/(1000*60*60*24);
  if(diffDays < 0) return "early";       // paid before due date
  if(diffDays <= 3) return "ontime";     // paid on time (3 day grace)
  return "late";                          // paid more than 3 days after due
}

// Summarise all paid invoices for a tenant, skipping excluded ones
function tenantPaymentProfile(tenantId, issuedInvoices){
  const invs=issuedInvoices.filter(i=>String(i.tenantId)===String(tenantId));
  if(invs.length===0) return null;
  let early=0,ontime=0,late=0,unpaid=0;
  invs.forEach(i=>{
    if(i.excludeFromScore) return; // skip flagged invoices
    const c=classifyPayment(i);
    if(c==="early") early++;
    else if(c==="ontime") ontime++;
    else if(c==="late") late++;
    else unpaid++;
  });
  const total=early+ontime+late+unpaid;
  const paidTotal=early+ontime+late;
  // Rating
  let rating,colour,emoji;
  if(total===0){rating="No history";colour="#a0b4c5";emoji="—";}
  else if(unpaid===total){rating="No payments";colour="#b03030";emoji="⚠";}
  else if(early>=paidTotal*0.7){rating="Excellent — pays in advance";colour="#1a7a3a";emoji="⭐";}
  else if(late===0){rating="Good — always on time";colour="#2d6a2d";emoji="✓";}
  else if(late<=paidTotal*0.25){rating="Mostly on time";colour="#8a6a1a";emoji="~";}
  else{rating="Often late";colour="#b03030";emoji="⚠";}
  return {early,ontime,late,unpaid,total,rating,colour,emoji};
}

/* Photo uploader (returns base64 string) */
function PhotoUploader({photo, onPhoto, label}){
  const ref=useRef();
  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>onPhoto(ev.target.result);
    reader.readAsDataURL(file);
  };
  if(photo){
    return(
      <div className="photo-preview">
        <img src={photo} alt="Property"/>
        <button className="photo-remove" onClick={()=>onPhoto(null)}>✕ Remove</button>
      </div>
    );
  }
  return(
    <div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      <div className="photo-upload-zone" onClick={()=>ref.current.click()}>
        <div style={{fontSize:"1.8rem"}}>🏢</div>
        <p>{label||"Click to upload property photo"}</p>
        <p style={{fontSize:".75rem",color:"#aaa",marginTop:".2rem"}}>JPG, PNG — appears on invoice</p>
      </div>
    </div>
  );
}

        } else if(!on && match.paid){
          // un-stamp — revert to unpaid
          const upd=issuedInvoices.map(i=>i.id===match.id?{...i,paid:false,paidDate:null}:i);
          setIssuedInvoices(upd);
          showToast("Stamp removed — invoice marked as unpaid.");
        }
      }
    }
  };

  // Update invoice number for a tenant and keep invTenant in sync
  const setInvNo=(id,val)=>{
    const n=Math.max(1,Number(val)||1);
    const updated=tenants.map(t=>t.id===id?{...t,invNo:n}:t);
    setTenants(updated);
    if(invTenant&&invTenant.id===id) setInvTenant({...invTenant,invNo:n});
  };

  const updateTenantPhoto=(id,photo)=>{
    const updated=tenants.map(t=>t.id===id?{...t,photo}:t);
    setTenants(updated);
    if(invTenant&&invTenant.id===id) setInvTenant({...invTenant,photo});
  };

  const baseRent=invTenant?Number(invTenant.rent):0;
  const extraChargesTotal=sumLines(extraCharges);
  const totalDue=baseRent+extraChargesTotal;
  const totalExpend=sumLines(expendLines);
  const netToLandlord=Math.max(0,totalDue-totalExpend);
  const periodStart=invTenant?.periodStart||"";
  const periodEnd=invTenant?.periodEnd||"";
  const invNo=invTenant?.invNo||1;

  // Fix: quarterly tenants pay 4x per year, monthly pay 12x
  const totalAnnualRent=tenants.reduce((s,t)=>{
    const r=Number(t.rent);
    return s+(t.frequency==="quarterly"?r*4:r*12);
  },0);
  const totalMonthlyRent=tenants.reduce((s,t)=>{
    const r=Number(t.rent);
    return s+(t.frequency==="quarterly"?r/3:r);
  },0);

  return(
    <div>
      <nav className="nav no-print">
        <div className="nav-logo">Janjua <span>&amp;</span> Associates</div>
        <button className={`nav-btn ${screen==="dashboard"?"active":""}`} onClick={()=>setScreen("dashboard")}>Dashboard</button>
        <button className={`nav-btn ${screen==="tenants"?"active":""}`} onClick={()=>setScreen("tenants")}>Tenants</button>
        <button className={`nav-btn ${screen==="records"?"active":""}`} onClick={()=>setScreen("records")}>Records</button>
        <button className={`nav-btn ${screen==="settings"?"active":""}`} onClick={()=>setScreen("settings")}>Settings</button>
        <div style={{width:"1px",background:"rgba(255,255,255,.12)",margin:"10px 0.4rem"}}/>
        <button className={`nav-btn ${screen==="immigration"?"active":""}`} style={{color:screen==="immigration"?"#fff":"#c9a84c"}} onClick={()=>setScreen("immigration")}>⚖ Immigration</button>
        <button className="nav-btn" style={{marginLeft:"auto",fontSize:".8rem",color:"#6b8a9a"}} onClick={()=>auth.signOut()}>Sign Out</button>
      </nav>

      {/* ── DASHBOARD ── */}
      {screen==="dashboard"&&(
        <div className="pg">
          <h1>Dashboard</h1>
          <p className="sub">Overview of your properties and generate invoices for your tenants.</p>

          {/* Stats row */}
          <div className="sg" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
            <div className="st"><div className="sl">Tenants</div><div className="sv">{tenants.length}</div></div>
            <div className="st"><div className="sl">Monthly Rent</div><div className="sv">£{fmt(totalMonthlyRent)}</div></div>
            <div className="st"><div className="sl">Annual Rent</div><div className="sv">£{fmt(totalAnnualRent)}</div></div>
            <div className="st"><div className="sl">Total Expenditure</div><div className="sv" style={{color:"#b03030"}}>£{fmt(issuedInvoices.reduce((s,i)=>s+Number(i.expenditure||0),0))}</div></div>
          </div>

          {/* Tab toggle */}
          <div style={{display:"flex",background:"#f0ece4",borderRadius:"7px",padding:".25rem",marginBottom:"1.5rem",width:"fit-content"}}>
            <button className={`btn bs ${dashTab==="generate"?"bp":""}`} style={{borderRadius:"5px",border:"none"}} onClick={()=>setDashTab("generate")}>
              🧾 Generate Invoices
            </button>
            <button className={`btn bs ${dashTab==="payments"?"bp":""}`} style={{borderRadius:"5px",border:"none",marginLeft:".2rem"}} onClick={()=>setDashTab("payments")}>
              💳 Payments
              {issuedInvoices.filter(i=>!i.paid).length>0&&(
                <span style={{background:"#e07070",color:"#fff",borderRadius:"20px",fontSize:".68rem",fontWeight:700,padding:".1rem .45rem",marginLeft:".4rem"}}>
                  {issuedInvoices.filter(i=>!i.paid).length}
                </span>
              )}
            </button>
          </div>

          {/* ── GENERATE TAB ── */}
          {dashTab==="generate"&&(
            <>
              {/* Upcoming payment reminders */}
              {(()=>{
                const today=new Date();
                const in7=new Date(today);in7.setDate(today.getDate()+7);
                const upcoming=tenants.filter(t=>{
                  if(!t.dueDay) return false;
                  const d=new Date(today.getFullYear(),today.getMonth(),Number(t.dueDay));
                  return d>=today && d<=in7 && issuedInvoices.some(i=>String(i.tenantId)===String(t.id)&&!i.paid);
                });
                if(upcoming.length===0) return null;
                return(
                  <div style={{background:"#fff8e6",border:"1.5px solid #c9a84c",borderRadius:"8px",padding:"1rem 1.3rem",marginBottom:"1.2rem"}}>
                    <div style={{fontWeight:700,color:"#8a6a1a",marginBottom:".5rem"}}>📅 Payments due in the next 7 days</div>
                    {upcoming.map(t=>(
                      <div key={t.id} style={{fontSize:".88rem",color:"#6b5a1a",display:"flex",justifyContent:"space-between",padding:".2rem 0",borderBottom:"1px solid #f0e0a0"}}>
                        <span>{t.companyName||t.contactName} · {t.property}</span>
                        <span style={{fontWeight:600}}>Due {ordinal(t.dueDay)} · £{fmt(t.rent)}</span>
                      </div>
                    ))}
                  </div>
                );
              })()}
              {tenants.length===0?(
                <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>
                  <div style={{fontSize:"2.5rem",marginBottom:".8rem"}}>🏢</div>
                  <p>No tenants yet. <button className="btn bo bs" style={{marginLeft:".5rem"}} onClick={()=>setScreen("tenants")}>Add Tenant</button></p>
                </div>
              ):tenants.map(t=>{
                const profile=tenantPaymentProfile(t.id,issuedInvoices);
                return(
                <div key={t.id} className="card tc">
                  {t.photo
                    ? <img src={t.photo} alt="" className="t-photo"/>
                    : <div className="av">{(t.companyName||t.contactName||"?").charAt(0).toUpperCase()}</div>
                  }
                  <div className="ti">
                    <div className="tn">{t.companyName||t.contactName} <span className="badge">Active</span></div>
                    <div className="tm">{t.property}{t.contactName?` · ${t.contactName}`:""}</div>
                    <div className="tm">🔁 {t.frequency==="quarterly"?"Quarterly":"Monthly"} · Invoice #{t.invNo||1}</div>
                    {profile&&<div className="tm" style={{color:profile.colour,fontWeight:600,marginTop:"2px"}}>{profile.emoji} {profile.rating} <span style={{color:"#a0b4c5",fontWeight:400}}>({profile.total} invoice{profile.total!==1?"s":""})</span></div>}
                    {profile&&profile.total>0&&(
                      <div className="pay-bar" style={{width:"120px"}}>
                        {profile.early>0&&<div className="pay-bar-seg" style={{flex:profile.early,background:"#c9a84c"}} title={`${profile.early} early`}/>}
                        {profile.ontime>0&&<div className="pay-bar-seg" style={{flex:profile.ontime,background:"#2d6a2d"}} title={`${profile.ontime} on time`}/>}
                        {profile.late>0&&<div className="pay-bar-seg" style={{flex:profile.late,background:"#e07070"}} title={`${profile.late} late`}/>}
                        {profile.unpaid>0&&<div className="pay-bar-seg" style={{flex:profile.unpaid,background:"#ddd8ce"}} title={`${profile.unpaid} unpaid`}/>}
                      </div>
                    )}
                  </div>
                  <span className="tr">£{fmt(t.rent)}/{t.frequency==="quarterly"?"qtr":"mo"}</span>
                  <button className="btn bg" onClick={()=>openInvoice(t)}>Generate Invoice</button>
                </div>
                );
              })}
            </>
          )}

          {/* ── PAYMENTS TAB ── */}
          {dashTab==="payments"&&(()=>{
            const received=issuedInvoices.filter(i=>i.paid);
            const outstanding=issuedInvoices.filter(i=>!i.paid);
            const totalReceived=received.reduce((s,i)=>s+Number(i.amountDue||0),0);
            const totalOutstanding=outstanding.reduce((s,i)=>s+Number(i.amountDue||0),0);
            return(
              <>
                <div className="sg" style={{gridTemplateColumns:"1fr 1fr",marginBottom:"1.5rem"}}>
                  <div className="st"><div className="sl">Total Received</div><div className="sv" style={{color:"#2d6a2d"}}>£{fmt(totalReceived)}</div></div>
                  <div className="st"><div className="sl">Total Outstanding</div><div className="sv" style={{color:"#b03030"}}>£{fmt(totalOutstanding)}</div></div>
                </div>

                {outstanding.length>0&&(
                  <div style={{marginBottom:"2rem"}}>
                    <h2 style={{color:"#b03030",marginBottom:".8rem"}}>⚠ Outstanding</h2>
                    {outstanding.sort((a,b)=>b.invNo-a.invNo).map(i=>{
                      const od=isOverdue(i);
                      return(
                      <div key={i.id} className="card tc" style={{borderLeft:`3px solid ${od?"#e07070":"#c9a84c"}`}}>
                        <div className="ti">
                          <div className="tn">{i.tenantName}
                            {od
                              ? <span className="badge badge-overdue">🔴 Overdue</span>
                              : <span className="badge" style={{background:"#fff8e6",color:"#8a6a1a"}}>⏳ Unpaid</span>
                            }
                          </div>
                          <div className="tm">{i.property} · Demand #{i.invNo}</div>
                          <div className="tm">Period: {i.periodStart} – {i.periodEnd} · {i.paymentDue?`Due: ${i.paymentDue}`:`Issued: ${i.dateIssued}`}</div>
                        </div>
                        <span className="tr" style={{color:"#b03030"}}>£{fmt(i.amountDue)}</span>
                        <button className="btn bg bs" onClick={()=>markPaid(i.id)}>Mark Paid</button>
                      </div>
                      );
                    })}
                  </div>
                )}

                {received.length>0&&(
                  <div>
                    <h2 style={{color:"#2d6a2d",marginBottom:".8rem"}}>✓ Received</h2>
                    {received.sort((a,b)=>b.invNo-a.invNo).map(i=>(
                      <div key={i.id} className="card tc" style={{borderLeft:"3px solid #7acc7a"}}>
                        <div className="ti">
                          <div className="tn">{i.tenantName} <span className="badge badge-paid">Paid</span></div>
                          <div className="tm">{i.property} · {i.frequency==="quarterly"?"Quarterly":"Monthly"} · Demand #{i.invNo}</div>
                          <div className="tm">Period: {i.periodStart} – {i.periodEnd} · Paid: {i.paidDate||"—"}</div>
                        </div>
                        <span className="tr" style={{color:"#2d6a2d"}}>£{fmt(i.amountDue)}</span>
                        <button className="btn bo bs" style={{fontSize:".75rem"}} onClick={()=>{
                          const upd=issuedInvoices.map(x=>x.id===i.id?{...x,paid:false,paidDate:null}:x);
                          setIssuedInvoices(upd);
                        }}>Undo</button>
                      </div>
                    ))}
                  </div>
                )}

                {issuedInvoices.length===0&&(
                  <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>
                    No invoices issued yet. Use Generate Invoices to get started.
                  </div>
                )}

                {/* Tenant payment ratings */}
                {tenants.length>0&&issuedInvoices.length>0&&(
                  <div style={{marginTop:"2rem"}}>
                    <h2 style={{marginBottom:".8rem"}}>🏅 Tenant Payment Ratings</h2>
                    {tenants.map(t=>{
                      const p=tenantPaymentProfile(t.id,issuedInvoices);
                      if(!p) return null;
                      return(
                        <div key={t.id} className="card" style={{padding:"1.1rem 1.5rem",marginBottom:".7rem",borderLeft:`3px solid ${p.colour}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:".5rem"}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,color:"#1c2b3a",fontSize:"1rem"}}>{t.companyName||t.contactName}</div>
                              <div style={{fontSize:".83rem",color:"#6b7e8f",marginTop:"2px"}}>{t.property}</div>
                              <div style={{fontWeight:600,color:p.colour,fontSize:".88rem",marginTop:".35rem"}}>{p.emoji} {p.rating}</div>
                              {/* Progress bar */}
                              {p.total>0&&(
                                <div style={{marginTop:".5rem"}}>
                                  <div className="pay-bar" style={{width:"240px",height:"8px"}}>
                                    {p.early>0&&<div className="pay-bar-seg" style={{flex:p.early,background:"#c9a84c"}}/>}
                                    {p.ontime>0&&<div className="pay-bar-seg" style={{flex:p.ontime,background:"#2d6a2d"}}/>}
                                    {p.late>0&&<div className="pay-bar-seg" style={{flex:p.late,background:"#e07070"}}/>}
                                    {p.unpaid>0&&<div className="pay-bar-seg" style={{flex:p.unpaid,background:"#ddd8ce"}}/>}
                                  </div>
                                  <div style={{display:"flex",gap:"1rem",marginTop:".3rem",fontSize:".75rem",flexWrap:"wrap"}}>
                                    {p.early>0&&<span style={{color:"#8a6a1a"}}>⭐ {p.early} early</span>}
                                    {p.ontime>0&&<span style={{color:"#2d6a2d"}}>✓ {p.ontime} on time</span>}
                                    {p.late>0&&<span style={{color:"#b03030"}}>⚠ {p.late} late</span>}
                                    {p.unpaid>0&&<span style={{color:"#a0b4c5"}}>○ {p.unpaid} unpaid</span>}
                                  </div>
                                </div>
                              )}
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",fontWeight:700,color:"#1c2b3a"}}>£{fmt(issuedInvoices.filter(i=>String(i.tenantId)===String(t.id)&&i.paid).reduce((s,i)=>s+Number(i.amountDue||0),0))}</div>
                              <div style={{fontSize:".75rem",color:"#6b7e8f"}}>total received</div>
                              <div style={{fontSize:".78rem",color:"#a0b4c5",marginTop:".2rem"}}>{p.total} invoice{p.total!==1?"s":""}</div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}

      {/* ── TENANTS ── */}
      {screen==="tenants"&&(
        <div className="pg">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"1.8rem"}}>
            <div><h1>Tenants</h1><p className="sub" style={{marginBottom:0}}>Manage tenant details and property photos</p></div>
            <button className="btn bp" onClick={()=>setEditTenant({id:null,companyName:"",contactName:"",address:"",email:"",property:"",rent:"",dueDay:1,ref:"",photo:null,periodStart:"",periodEnd:"",frequency:"monthly",invNo:1,notes:""})}>+ Add Tenant</button>
          </div>
          {tenants.length===0?(
            <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>No tenants added yet.</div>
          ):tenants.map(t=>(
            <div key={t.id} className="card tc">
              {t.photo
                ? <img src={t.photo} alt="" className="t-photo"/>
                : <div className="t-photo-placeholder" onClick={()=>setEditTenant({...t})} title="Add photo">📷</div>
              }
              <div className="ti">
                <div className="tn">{t.companyName||t.contactName}</div>
                <div className="tm">{t.property}</div>
                <div className="tm">📧 {t.email||"No email"} · Contact: {t.contactName} · Ref: {t.ref||"—"}</div>
                {(t.periodStart||t.periodEnd)&&<div className="tm">📅 {t.periodStart||"?"} – {t.periodEnd||"?"}</div>}
                <div className="tm">🔁 {t.frequency==="quarterly"?"Quarterly (Quarter Days)":"Monthly"} · 📆 Due: {ordinal(t.dueDay||1)} of each month</div>
                {t.notes&&<div className="tm" style={{marginTop:"3px",fontStyle:"italic",color:"#8a7a5a"}}>📝 {t.notes}</div>}
              </div>
              <span className="tr">£{fmt(t.rent)}</span>
              <div style={{display:"flex",gap:".5rem"}}>
                <button className="btn bo bs" onClick={()=>setEditTenant({...t})}>Edit</button>
                <button className="btn bd bs" onClick={()=>{setTenants(tenants.filter(x=>x.id!==t.id));showToast("Tenant removed.");}}>Remove</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── RECORDS ── */}
      {screen==="records"&&(()=>{
        // Date range filtering helper
        const now=new Date();
        const inRange=inv=>{
          if(recordsRange==="all") return true;
          const d=parseDate(inv.dateIssued)||parseDate(inv.periodStart);
          if(!d) return true;
          if(recordsRange==="thisMonth") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
          if(recordsRange==="thisQuarter"){const q=Math.floor(now.getMonth()/3);return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear();}
          if(recordsRange==="thisYear") return d.getFullYear()===now.getFullYear();
          return true;
        };
        const filtered=(filterTenant==="all"
          ?[...issuedInvoices]
          :issuedInvoices.filter(i=>String(i.tenantId)===String(filterTenant))
        ).filter(inRange).filter(i=>filterFY==="all"||i.financialYear===filterFY);
        const sorted=[...filtered].sort((a,b)=>b.invNo-a.invNo);
        const totalReceived=sorted.filter(i=>i.paid).reduce((s,i)=>s+Number(i.amountDue||0),0);
        const totalOutstanding=sorted.filter(i=>!i.paid).reduce((s,i)=>s+Number(i.amountDue||0),0);
        const totalExpend=sorted.reduce((s,i)=>s+Number(i.expenditure||0),0);

        const exportCSV=()=>{
          const rows=[["#","Tenant","Property","Period Start","Period End","Issued","Due","Amount","Expenditure","Status","Paid Date","Score"]];
          sorted.forEach(inv=>{
            const cls=classifyPayment(inv);
            rows.push([inv.invNo,inv.tenantName,inv.property,inv.periodStart,inv.periodEnd,inv.dateIssued,inv.paymentDue||"",inv.amountDue,inv.expenditure||0,inv.paid?"Paid":"Unpaid",inv.paidDate||"",inv.excludeFromScore?"Excluded":cls]);
          });
          const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
          const a=document.createElement("a");
          a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
          a.download=`janjua-records-${todayStr().replace(/\//g,"-")}.csv`;
          a.click();
        };

        // Property statements — group by property
        const statementsFiltered=filterTenant==="all"
          ?[...issuedInvoices]
          :issuedInvoices.filter(i=>String(i.tenantId)===String(filterTenant));
        const byProperty={};
        statementsFiltered.forEach(inv=>{
          const key=inv.property||inv.tenantName;
          if(!byProperty[key]) byProperty[key]={property:key,tenantName:inv.tenantName,records:[]};
          byProperty[key].records.push(inv);
        });

        return(
          <div className="pg">
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"1.2rem",flexWrap:"wrap",gap:"1rem"}}>
              <div>
                <h1>Records</h1>
                <p className="sub" style={{marginBottom:0}}>Invoice history and property expenditure</p>
              </div>
              <button className="btn bo bs" onClick={exportCSV}>⬇ Export CSV</button>
            </div>
            {/* Filters row */}
            <div style={{display:"flex",gap:".7rem",flexWrap:"wrap",marginBottom:"1.3rem",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:".5rem"}}>
                <label style={{margin:0,fontSize:".78rem",whiteSpace:"nowrap"}}>Tenant:</label>
                <select value={filterTenant} onChange={e=>setFilterTenant(e.target.value)} style={{width:"auto",padding:".38rem .7rem"}}>
                  <option value="all">All Tenants</option>
                  {tenants.map(t=>(
                    <option key={t.id} value={t.id}>{t.companyName||t.contactName}</option>
                  ))}
                </select>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:".5rem"}}>
                <label style={{margin:0,fontSize:".78rem",whiteSpace:"nowrap"}}>FY:</label>
                <select value={filterFY||"all"} onChange={e=>setFilterFY(e.target.value)} style={{width:"auto",padding:".38rem .7rem"}}>
                  <option value="all">All Years</option>
                  {[...new Set(issuedInvoices.map(i=>i.financialYear).filter(Boolean))].sort().reverse().map(fy=>(
                    <option key={fy} value={fy}>{fy}</option>
                  ))}
                </select>
              </div>
            </div>
            <div style={{display:"flex",background:"#f0ece4",borderRadius:"7px",padding:".25rem",marginBottom:"1.5rem",width:"fit-content"}}>
              <button className={`btn bs ${recordsTab==="invoices"?"bp":""}`} style={{borderRadius:"5px",border:"none"}} onClick={()=>setRecordsTab("invoices")}>
                📄 Invoice Records
              </button>
              <button className={`btn bs ${recordsTab==="statements"?"bp":""}`} style={{borderRadius:"5px",border:"none",marginLeft:".2rem"}} onClick={()=>setRecordsTab("statements")}>
                📊 Property Statements
              </button>
            </div>

            {/* ── INVOICE RECORDS TAB ── */}
            {recordsTab==="invoices"&&(<>
              <div className="sg" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:"1.5rem"}}>
                <div className="st"><div className="sl">Received</div><div className="sv" style={{color:"#2d6a2d"}}>£{fmt(totalReceived)}</div></div>
                <div className="st"><div className="sl">Outstanding</div><div className="sv" style={{color:"#b03030"}}>£{fmt(totalOutstanding)}</div></div>
                <div className="st"><div className="sl">Expenditure</div><div className="sv" style={{color:"#b03030"}}>£{fmt(totalExpend)}</div></div>
              </div>

              {/* Tenant score summary */}
              {tenants.length>0&&issuedInvoices.length>0&&(
                <div style={{display:"flex",gap:".7rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
                  {tenants.map(t=>{
                    const p=tenantPaymentProfile(t.id,issuedInvoices);
                    if(!p||p.total===0) return null;
                    return(
                      <div key={t.id} style={{background:"#fff",border:`2px solid ${p.colour}`,borderRadius:"8px",padding:".6rem 1rem",minWidth:"160px"}}>
                        <div style={{fontWeight:600,fontSize:".85rem",color:"#1c2b3a"}}>{t.companyName||t.contactName}</div>
                        <div style={{fontWeight:700,color:p.colour,fontSize:".88rem",marginTop:".2rem"}}>{p.emoji} {p.rating}</div>
                        <div style={{fontSize:".75rem",color:"#a0b4c5",marginTop:".2rem"}}>
                          {p.early>0&&<span style={{color:"#8a6a1a",marginRight:".5rem"}}>⭐{p.early} early</span>}
                          {p.ontime>0&&<span style={{color:"#2d6a2d",marginRight:".5rem"}}>✓{p.ontime} on time</span>}
                          {p.late>0&&<span style={{color:"#b03030",marginRight:".5rem"}}>⚠{p.late} late</span>}
                          {p.unpaid>0&&<span style={{color:"#a0b4c5"}}>○{p.unpaid} unpaid</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {sorted.length===0?(
                <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>
                  No invoices issued yet. Generate an invoice and click <strong>Issue Invoice</strong> to record it here.
                </div>
              ):(
                <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:"8px",overflow:"hidden",boxShadow:"0 1px 8px rgba(28,43,58,.08)",border:"1px solid #e8e4dc"}}>
                  <thead>
                    <tr style={{background:"#1c2b3a"}}>
                      {["#","FY","FY Demand","Tenant","Property","Period","Issued","Due","Amount","Expenditure","Status","Score",""].map(h=>(
                        <th key={h} style={{padding:".7rem 1rem",textAlign:"left",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".07em",color:"#a0b4c5",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map((inv,idx)=>{
                      const cls=classifyPayment(inv);
                      const clsLabel={early:"⭐ Early",ontime:"✓ On Time",late:"⚠ Late",unpaid:"○ Unpaid"}[cls];
                      const clsColour={early:"#8a6a1a",ontime:"#2d6a2d",late:"#b03030",unpaid:"#a0b4c5"}[cls];
                      return(
                      <tr key={inv.id} style={{borderBottom:"1px solid #f0ece4",background:idx%2===0?"#fff":"#fdfcf9"}}>
                        <td style={{padding:".7rem 1rem",fontSize:".88rem",color:"#6b7e8f",fontWeight:600}}>{inv.invNo}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".82rem",fontWeight:700,color:"#8a6a1a",whiteSpace:"nowrap"}}>{inv.financialYear||"—"}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".88rem",color:"#1c2b3a",fontWeight:600,whiteSpace:"nowrap"}}>{inv.fyInvNo||"—"}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".9rem",color:"#1c2b3a",fontWeight:600}}>{inv.tenantName}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".85rem",color:"#6b7e8f"}}>{inv.property}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".82rem",color:"#6b7e8f",whiteSpace:"nowrap"}}>{inv.periodStart||"—"}<br/>{inv.periodEnd||""}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".85rem",color:"#6b7e8f",whiteSpace:"nowrap"}}>{inv.dateIssued}</td>
                        <td style={{padding:".7rem 1rem",fontSize:".85rem",whiteSpace:"nowrap",color:inv.paymentDue?"#1c2b3a":"#c5bfb0",fontWeight:inv.paymentDue?600:400}}>{inv.paymentDue||"—"}</td>
                        <td style={{padding:".7rem 1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",fontWeight:700,color:"#1c2b3a",whiteSpace:"nowrap"}}>£{fmt(inv.amountDue)}</td>
                        <td style={{padding:".7rem 1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",fontWeight:700,color:"#b03030",whiteSpace:"nowrap"}}>{Number(inv.expenditure)>0?`−£${fmt(inv.expenditure)}`:"—"}</td>
                        <td style={{padding:".7rem 1rem"}}>
                          {inv.paid
                            ? <span className="badge badge-paid">✓ Paid {inv.paidDate||""}</span>
                            : <span className="badge badge-overdue">Unpaid</span>
                          }
                        </td>
                        <td style={{padding:".7rem 1rem",whiteSpace:"nowrap",fontWeight:600,fontSize:".82rem",color:inv.excludeFromScore?"#c5bfb0":clsColour}}>
                          {inv.excludeFromScore
                            ? <span style={{color:"#c5bfb0",fontStyle:"italic",fontWeight:400}}>— excluded</span>
                            : clsLabel
                          }
                        </td>
                        <td style={{padding:".7rem 1rem",whiteSpace:"nowrap"}}>
                          <div style={{display:"flex",gap:".4rem",alignItems:"center",flexWrap:"wrap"}}>
                            {!inv.paid&&(
                              <button className="btn bg bs" onClick={()=>markPaid(inv.id)}>Mark Paid</button>
                            )}
                            {inv.paid&&(
                              <button className="btn bo bs" style={{fontSize:".75rem"}} onClick={()=>{
                                const updated=issuedInvoices.map(i=>i.id===inv.id?{...i,paid:false,paidDate:null}:i);
                                setIssuedInvoices(updated);
                              }}>Undo</button>
                            )}
                            <button
                              className="btn bs"
                              title={inv.excludeFromScore?"Include this invoice in score":"Exclude this invoice from score"}
                              style={{fontSize:".75rem",background:inv.excludeFromScore?"#f0ece4":"#fff8e6",border:"1px solid #c9a84c",color:"#8a6a1a"}}
                              onClick={()=>{
                                const updated=issuedInvoices.map(i=>i.id===inv.id?{...i,excludeFromScore:!i.excludeFromScore}:i);
                                setIssuedInvoices(updated);
                                showToast(inv.excludeFromScore?"Invoice included in score.":"Invoice excluded from score.");
                              }}
                            >{inv.excludeFromScore?"↩ Include":"⊘ Exclude"}</button>
                            <button className="btn bd bs" style={{fontSize:".75rem"}} onClick={()=>deleteInvoice(inv.id)}>🗑</button>
                          </div>
                        </td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </>)}

            {/* ── PROPERTY STATEMENTS TAB ── */}
            {recordsTab==="statements"&&(<>
              {Object.values(byProperty).length===0?(
                <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>
                  No property statements yet. Issue invoices with expenditure to see them here.
                </div>
              ):Object.values(byProperty).map(prop=>{
                const propRecords=[...prop.records].sort((a,b)=>b.invNo-a.invNo);
                const propExpend=propRecords.reduce((s,i)=>s+Number(i.expenditure||0),0);
                const propIncome=propRecords.filter(i=>i.paid).reduce((s,i)=>s+Number(i.amountDue||0),0);
                const propNet=propIncome-propExpend;
                return(
                  <div key={prop.property} className="card" style={{marginBottom:"1.5rem",padding:0,overflow:"hidden"}}>
                    {/* Property header */}
                    <div style={{background:"#1c2b3a",padding:"1rem 1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:700,color:"#fff"}}>{prop.property}</div>
                        <div style={{fontSize:".8rem",color:"#a0b4c5",marginTop:".15rem"}}>{prop.tenantName}</div>
                      </div>
                      <div style={{display:"flex",gap:"1.5rem",textAlign:"right"}}>
                        <div><div style={{fontSize:".7rem",textTransform:"uppercase",letterSpacing:".07em",color:"#a0b4c5"}}>Income</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:700,color:"#c9a84c"}}>£{fmt(propIncome)}</div></div>
                        <div><div style={{fontSize:".7rem",textTransform:"uppercase",letterSpacing:".07em",color:"#a0b4c5"}}>Expenditure</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:700,color:"#e07070"}}>£{fmt(propExpend)}</div></div>
                        <div><div style={{fontSize:".7rem",textTransform:"uppercase",letterSpacing:".07em",color:"#a0b4c5"}}>Net</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:700,color:propNet>=0?"#7acc7a":"#e07070"}}>£{fmt(propNet)}</div></div>
                      </div>
                    </div>
                    {/* Per-period breakdown */}
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>
                        <tr style={{background:"#f8f7f4",borderBottom:"1px solid #e8e4dc"}}>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"left"}}>Period</th>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"left"}}>Inv #</th>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"left"}}>Rent</th>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"left"}}>Expenditure Items</th>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"right"}}>Total Spent</th>
                          <th style={{padding:".55rem 1.2rem",fontSize:".73rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",textAlign:"right"}}>Net</th>
                        </tr>
                      </thead>
                      <tbody>
                        {propRecords.map((inv,idx)=>(
                          <tr key={inv.id} style={{borderBottom:"1px solid #f0ece4",background:idx%2===0?"#fff":"#fdfcf9"}}>
                            <td style={{padding:".65rem 1.2rem",fontSize:".85rem",color:"#6b7e8f"}}>{inv.periodStart||"—"} – {inv.periodEnd||""}</td>
                            <td style={{padding:".65rem 1.2rem",fontSize:".85rem",color:"#6b7e8f"}}>{inv.invNo}</td>
                            <td style={{padding:".65rem 1.2rem",fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",fontWeight:700,color:"#1c2b3a"}}>£{fmt(inv.amountDue)}</td>
                            <td style={{padding:".65rem 1.2rem",fontSize:".82rem",color:"#6b7e8f"}}>
                              {(inv.expendLines&&inv.expendLines.length>0)
                                ?inv.expendLines.map((l,i)=><div key={i}>{l.description||"—"}: £{fmt(l.amount)}</div>)
                                :<span style={{color:"#c5bfb0"}}>None</span>
                              }
                            </td>
                            <td style={{padding:".65rem 1.2rem",fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",fontWeight:700,color:"#b03030",textAlign:"right"}}>{Number(inv.expenditure)>0?`£${fmt(inv.expenditure)}`:"—"}</td>
                            <td style={{padding:".65rem 1.2rem",fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",fontWeight:700,textAlign:"right",color:(Number(inv.amountDue)-Number(inv.expenditure))>=0?"#2d6a2d":"#b03030"}}>£{fmt(Number(inv.amountDue)-Number(inv.expenditure))}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </>)}
          </div>
        );
      })()}

      {/* ── SETTINGS ── */}
      {screen==="settings"&&(
        <div className="pg">
          <h1>Settings</h1>
          <p className="sub">Your details appear on every invoice and are saved automatically.</p>
          <div className="card">
            <h2>Landlord / Company Details</h2>
            <div className="row2">
              <div className="fg"><label>Full Name</label><input value={landlord.name} onChange={e=>setLL({...landlord,name:e.target.value})}/></div>
              <div className="fg"><label>Company Name</label><input value={landlord.company} onChange={e=>setLL({...landlord,company:e.target.value})}/></div>
            </div>
            <div className="fg"><label>Address</label><input value={landlord.address} onChange={e=>setLL({...landlord,address:e.target.value})}/></div>
            <div className="row2">
              <div className="fg"><label>Email</label><input value={landlord.email} onChange={e=>setLL({...landlord,email:e.target.value})}/></div>
              <div className="fg"><label>Phone / Mobile</label><input value={landlord.phone} onChange={e=>setLL({...landlord,phone:e.target.value})}/></div>
            </div>
            <hr className="sec"/>
            <h2>Bank Details</h2>
            <div className="row3">
              <div className="fg"><label>Account Name</label><input value={landlord.accountName} onChange={e=>setLL({...landlord,accountName:e.target.value})}/></div>
              <div className="fg"><label>Sort Code</label><input value={landlord.sortCode} onChange={e=>setLL({...landlord,sortCode:e.target.value})}/></div>
              <div className="fg"><label>Account Number</label><input value={landlord.accountNumber} onChange={e=>setLL({...landlord,accountNumber:e.target.value})}/></div>
            </div>
            <button className="btn bp" onClick={()=>showToast("✓ Settings saved!")}>Save Settings</button>
          </div>
        </div>
      )}

      {/* ── INVOICE BUILDER ── */}
      {screen==="invoice"&&invTenant&&(
        <div className="pg">
          {/* Top controls */}
          <div className="ctrl-bar no-print">
            <button className="btn bo" onClick={()=>setScreen("dashboard")}>← Back</button>

            {/* Financial Year selector */}
            <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #c9a84c",borderRadius:"5px",padding:".28rem .7rem"}}>
              <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#8a6a1a",fontWeight:700,whiteSpace:"nowrap"}}>FY</span>
              <select value={financialYear} onChange={e=>setFinancialYear(e.target.value)} style={{border:"none",background:"transparent",fontSize:".9rem",fontWeight:600,color:"#1c2b3a",cursor:"pointer",padding:"0"}}>
                {(()=>{
                  const cur=new Date().getFullYear();
                  return [cur-2,cur-1,cur,cur+1].map(y=>{
                    const fy=`${y}/${String(y+1).slice(2)}`;
                    return <option key={fy} value={fy}>{fy}</option>;
                  });
                })()}
              </select>
            </div>

            {/* Invoice number stepper per tenant */}
            <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #ddd8ce",borderRadius:"5px",padding:".28rem .6rem"}}>
              <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600,whiteSpace:"nowrap"}}>Demand #</span>
              <button onClick={()=>setInvNo(invTenant.id,(invNo-1))} style={{background:"none",border:"none",cursor:"pointer",color:"#1c2b3a",fontSize:"1rem",fontWeight:700,padding:"0 .3rem",lineHeight:1}}>−</button>
              <input value={invNo} onChange={e=>setInvNo(invTenant.id,e.target.value)} style={{width:"48px",padding:".25rem .4rem",textAlign:"center",fontSize:".95rem",border:"1px solid #ddd8ce",borderRadius:"4px"}}/>
              <button onClick={()=>setInvNo(invTenant.id,(invNo+1))} style={{background:"none",border:"none",cursor:"pointer",color:"#1c2b3a",fontSize:"1rem",fontWeight:700,padding:"0 .3rem",lineHeight:1}}>+</button>
            </div>

            {/* View toggle */}
            <div style={{display:"flex",background:"#f0ece4",borderRadius:"6px",padding:".2rem"}}>
              <button className={`btn bs ${invView==="tenant"?"bp":""}`} style={{borderRadius:"4px",border:"none"}} onClick={()=>setInvView("tenant")}>
                📄 Rent Demand
              </button>
              <button className={`btn bs ${invView==="landlord"?"bp":""}`} style={{borderRadius:"4px",border:"none",marginLeft:".2rem"}} onClick={()=>setInvView("landlord")}>
                📊 Property Statement
              </button>
            </div>

            <div style={{flex:1}}/>
            <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #ddd8ce",borderRadius:"5px",padding:".28rem .7rem"}}>
              <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600,whiteSpace:"nowrap"}}>Date of Issue</span>
              <input value={issueDate} onChange={e=>setIssueDate(e.target.value)} placeholder="DD/MM/YYYY" style={{width:"110px",padding:".25rem .4rem",fontSize:".9rem",border:"1px solid #ddd8ce",borderRadius:"4px"}}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #ddd8ce",borderRadius:"5px",padding:".28rem .7rem"}}>
              <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600,whiteSpace:"nowrap"}}>Payment Due</span>
              <input value={paymentDue} onChange={e=>setPaymentDue(e.target.value)} placeholder="DD/MM/YYYY" title={`Auto-set from tenant due day (${ordinal(invTenant?.dueDay||1)} of month). Edit if needed.`} style={{width:"110px",padding:".25rem .4rem",fontSize:".9rem",border:"1px solid #ddd8ce",borderRadius:"4px",background:"#f8f7f4"}}/>
            </div>
            {invView==="tenant"&&(
              <div className="stamp-toggle">
                <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600,whiteSpace:"nowrap"}}>🟢 Paid Date</span>
                <input value={stampDate} onChange={e=>setStampDate(e.target.value)} placeholder="DD/MM/YYYY" style={{width:"110px",padding:".3rem .5rem",fontSize:".85rem"}}/>
                <input type="checkbox" id="stamp" checked={stampOn} onChange={e=>handleStampToggle(e.target.checked)}/>
                <label htmlFor="stamp">Rent Received Stamp</label>
              </div>
            )}
            <input value={invMemo} onChange={e=>setInvMemo(e.target.value)} placeholder="📝 Invoice note / memo (optional)..." style={{flex:"1 1 180px",minWidth:"150px",padding:".38rem .7rem",fontSize:".88rem",border:"1.5px solid #ddd8ce",borderRadius:"5px",fontStyle:invMemo?"normal":"italic"}}/>
            <button className="btn bg" onClick={issueInvoice}>✓ Issue Invoice</button>
            <button className="btn bp" onClick={()=>window.print()}>🖨 Print / Save PDF</button>
          </div>

          <div className="builder-grid">
            {/* LEFT PANEL */}
            <div className="no-print">
              {/* Photo uploader */}
              <div className="section-box">
                <div className="section-header" style={{marginBottom:".6rem"}}>
                  <h3 style={{marginBottom:0}}>Property Photo</h3>
                  <span style={{fontSize:".75rem",color:"#6b7e8f"}}>appears on both</span>
                </div>
                <PhotoUploader photo={invTenant.photo} onPhoto={p=>updateTenantPhoto(invTenant.id,p)} label="Click to upload property photo"/>
              </div>

              {/* Rental period — editable directly on invoice */}
              <div className="section-box">
                <div className="section-header" style={{marginBottom:".6rem"}}>
                  <h3 style={{marginBottom:0}}>Rental Period</h3>
                </div>
                <div className="fg" style={{marginBottom:".6rem"}}>
                  <label>From</label>
                  <input
                    value={invTenant.periodStart||""}
                    onChange={e=>{
                      const updated={...invTenant,periodStart:e.target.value};
                      setInvTenant(updated);
                      setTenants(tenants.map(t=>t.id===invTenant.id?updated:t));
                    }}
                    placeholder="e.g. 1st March 2026"
                  />
                </div>
                <div className="fg" style={{marginBottom:0}}>
                  <label>To</label>
                  <input
                    value={invTenant.periodEnd||""}
                    onChange={e=>{
                      const updated={...invTenant,periodEnd:e.target.value};
                      setInvTenant(updated);
                      setTenants(tenants.map(t=>t.id===invTenant.id?updated:t));
                    }}
                    placeholder="e.g. 1st April 2026"
                  />
                </div>
              </div>

              {invView==="tenant"?(
                <>
                  {/* TENANT VIEW inputs — additional charges only */}
                  <div className="section-box">
                    <div className="section-header">
                      <h3 style={{marginBottom:0}}>{invTenant.frequency==="quarterly"?"Quarterly Rent":"Monthly Rent"}</h3>
                      <strong style={{color:"#1c2b3a",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem"}}>£{fmt(baseRent)}</strong>
                    </div>
                    <div style={{fontSize:".76rem",textTransform:"uppercase",letterSpacing:".07em",color:"#6b7e8f",fontWeight:600,marginBottom:".4rem"}}>Additional Charges</div>
                    <LineItems items={extraCharges} setItems={setExtraCharges} placeholder="e.g. Service charge"/>
                  </div>
                  <div className="net-bar">
                    <span style={{color:"#a0b4c5",fontSize:".9rem",fontWeight:600}}>Total Due from Tenant</span>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",fontWeight:700,color:"#c9a84c"}}>£{fmt(totalDue)}</span>
                  </div>
                </>
              ):(
                <>
                  {/* LANDLORD VIEW inputs — income + expenditure */}
                  <div className="section-box">
                    <div className="section-header">
                      <h3 style={{marginBottom:0}}>Rent Received</h3>
                      <span className="stag inc">£{fmt(totalDue)}</span>
                    </div>
                    <div className="fixed-row">
                      <span>{invTenant.frequency==="quarterly"?"Quarterly Rent":"Monthly Rent"}</span>
                      <strong>£{fmt(baseRent)}</strong>
                    </div>
                    {extraCharges.length>0&&extraCharges.filter(r=>r.description||r.amount).map(r=>(
                      <div key={r.id} className="fixed-row" style={{background:"#f8f7f4"}}>
                        <span style={{fontSize:".85rem"}}>{r.description||"Additional charge"}</span>
                        <span style={{fontWeight:600,fontSize:".85rem"}}>£{fmt(r.amount)}</span>
                      </div>
                    ))}
                  </div>
                  <div className="section-box">
                    <div className="section-header">
                      <h3 style={{marginBottom:0}}>Expenditure</h3>
                      <span className="stag exp">£{fmt(totalExpend)}</span>
                    </div>
                    <LineItems items={expendLines} setItems={setExpendLines} placeholder="e.g. Repair works"/>
                  </div>
                  <div className="net-bar">
                    <span style={{color:"#a0b4c5",fontSize:".9rem",fontWeight:600}}>Net to Landlord</span>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",fontWeight:700,color:"#c9a84c"}}>£{fmt(netToLandlord)}</span>
                  </div>
                </>
              )}
            </div>

            {/* ── INVOICE PREVIEW ── */}
            <div className="inv-page">
              <div className="inv-top">
                <div className="inv-top-left">
                  <div className="inv-co">{landlord.company}</div>
                  <div className="inv-co-sub">
                    email: <a href={"mailto:"+landlord.email}>{landlord.email}</a>
                    &nbsp;·&nbsp; Mobile: {landlord.phone}
                  </div>
                </div>
                <div className="inv-top-right">
                  <div className="inv-badge">{invView==="tenant"?"Rent Demand":"Property Statement"}</div>
                  {invTenant.photo
                    ? <img src={invTenant.photo} alt="Property" className="inv-prop-photo"/>
                    : <div className="inv-prop-photo-placeholder">Upload property photo →</div>
                  }
                </div>
              </div>

              <div className="inv-body">
                {/* Meta grid */}
                <div className="inv-grid">
                  <div>
                    <div className="inv-sect-label">{invView==="tenant"?"Demand Details":"Statement Details"}</div>
                    <div className="inv-detail">
                      <strong>Financial Year:</strong> {financialYear}<br/>
                      <strong>{invView==="tenant"?"Demand":"Statement"} No:</strong> {(invTenant.fyCounters&&invTenant.fyCounters[financialYear])||1} <span style={{color:"#a0b4c5",fontSize:".82em"}}>(FY) · #{invNo} overall</span><br/>
                      <strong>Date of Issue:</strong> {issueDate}<br/>
                      {paymentDue&&<><strong>Payment Due:</strong> {paymentDue}<br/></>}
                      <strong>Rental Period:</strong> {periodStart} – {periodEnd}<br/>

            </div>
          </div>
        </div>
      )}

      {/* ── TENANT MODAL ── */}

          <div className="md" onClick={e=>e.stopPropagation()}>

              <div className="fg"><label>Rental Period — To</label><input value={editTenant.periodEnd||""} onChange={e=>setEditTenant({...editTenant,periodEnd:e.target.value})} placeholder="e.g. 1st February 2026"/></div>
              <div className="fg"><label>Payment Ref</label><input value={editTenant.ref} onChange={e=>setEditTenant({...editTenant,ref:e.target.value})} placeholder="e.g. DINSOLICITORS"/></div>

                else updated=tenants.map(t=>t.id===editTenant.id?editTenant:t);

          ── IMMIGRATION SECTION ──
      ══════════════════════════════════════════════════════ */}
      {screen==="immigration"&&(()=>{
        const IMM_CASE_TYPES=["Visa Application","Appeal / Tribunal","Naturalisation / Citizenship","Spouse / Family Visa","Leave to Remain","EEA / Settled Status","Asylum","Judicial Review","Other"];
        const IMM_STATUSES=["Active","Awaiting Decision","Approved","Refused","Appealing","Closed"];
        const statusEmoji={Active:"🟢",Awaiting:"🟡","Awaiting Decision":"🟡",Approved:"✅",Refused:"🔴",Appealing:"🔵",Closed:"⚫"};
        const clientName=c=>`${c.firstName||""} ${c.lastName||""}`.trim()||"Unnamed";
        const clientMap={};immClients.forEach(c=>{clientMap[c.id]=c;});
        const caseRef=c=>c.caseRef||`JA-IMM-${String(c.id).padStart(4,"0")}`;

        // Open fee note builder for a case
        const openFeeNote=c=>{
          setFnCase(c);setFnIssueDate(todayStr());setFnPaymentDue("");
          setFnDisburse([]);setFnMemo("");setFnFY(getFY(new Date()));
          setImmScreen("feenote");
        };

        // Issue fee note
        const issueFeeNote=()=>{
          if(!fnCase) return;
          const existingForCase=immFeeNotes.filter(f=>f.caseId===fnCase.id&&f.financialYear===fnFY);
          const fyFnNo=existingForCase.length+1;
          const disbTotal=fnDisburse.reduce((s,r)=>s+Number(r.amount||0),0);
          const record={
            id:uid(), caseId:fnCase.id, clientId:fnCase.clientId,
            clientName:clientName(clientMap[fnCase.clientId]||{}),
            caseRef:caseRef(fnCase), caseType:fnCase.caseType,
            hoRef:fnCase.hoRef||"",
            financialYear:fnFY, fyFnNo,
            dateIssued:fnIssueDate, paymentDue:fnPaymentDue,
            fixedFee:Number(fnCase.fixedFee||0),
            disbursements:fnDisburse.filter(r=>r.description||r.amount),
            disbTotal, total:Number(fnCase.fixedFee||0)+disbTotal,
            memo:fnMemo, paid:false, paidDate:null,
          };
          setImmFeeNotes([...immFeeNotes,record]);
          // Update case fnNo counter
          const updCases=immCases.map(c=>c.id===fnCase.id?{...c,fnNo:(c.fnNo||1)+1}:c);
          setImmCases(updCases);
          showToast("✓ Fee note issued!");
          setImmScreen("records");
        };

        return(
          <div className="pg">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"1rem",flexWrap:"wrap",gap:"1rem"}}>
              <div>
                <h1>⚖ Immigration</h1>
                <p className="sub" style={{marginBottom:0}}>Case management and fee notes — Janjua and Associates Limited</p>
              </div>
            </div>

            {/* Sub-nav */}
            <div className="imm-nav no-print">
              {[["dashboard","📊 Overview"],["clients","👤 Clients"],["cases","📁 Cases"],["records","🗂 Fee Notes"],["settings","⚙ Firm Settings"]].map(([s,l])=>(
                <button key={s} className={`imm-nav-btn ${immScreen===s?"active":""}`} onClick={()=>setImmScreen(s)}>{l}</button>
              ))}
            </div>

            {/* ── OVERVIEW ── */}
            {immScreen==="dashboard"&&(()=>{
              const active=immCases.filter(c=>c.status==="Active").length;
              const awaiting=immCases.filter(c=>c.status==="Awaiting Decision").length;
              const approved=immCases.filter(c=>c.status==="Approved").length;
              const refused=immCases.filter(c=>c.status==="Refused").length;
              const totalFees=immFeeNotes.filter(f=>f.paid).reduce((s,f)=>s+Number(f.total||0),0);
              const outstanding=immFeeNotes.filter(f=>!f.paid).reduce((s,f)=>s+Number(f.total||0),0);
              // Upcoming deadlines
              const today=new Date();
              const in14=new Date(today);in14.setDate(today.getDate()+14);
              const upcoming=immCases.filter(c=>{
                if(!c.deadline&&!c.hearingDate) return false;
                const d=parseDate(c.deadline)||parseDate(c.hearingDate);
                return d&&d>=today&&d<=in14&&c.status!=="Closed"&&c.status!=="Approved";
              }).sort((a,b)=>(parseDate(a.deadline||a.hearingDate))-(parseDate(b.deadline||b.hearingDate)));
              return(<>
                <div className="sg" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:"1.5rem"}}>
                  <div className="st"><div className="sl">Total Cases</div><div className="sv">{immCases.length}</div></div>
                  <div className="st"><div className="sl">Fees Received</div><div className="sv" style={{color:"#2d6a2d"}}>£{fmt(totalFees)}</div></div>
                  <div className="st"><div className="sl">Outstanding</div><div className="sv" style={{color:"#b03030"}}>£{fmt(outstanding)}</div></div>
                </div>
                {/* Status breakdown */}
                <div style={{display:"flex",gap:".6rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
                  {[["Active","#2d6a2d","#e8f3e8"],["Awaiting Decision","#8a6a1a","#fff8e6"],["Approved","#1a6a1a","#e0f0e0"],["Refused","#b03030","#ffeaea"],["Appealing","#6030a0","#f0e8ff"],["Closed","#6b7e8f","#f0ece4"]].map(([st,col,bg])=>{
                    const n=immCases.filter(c=>c.status===st).length;
                    return(<div key={st} style={{background:bg,border:`1.5px solid ${col}`,borderRadius:"8px",padding:".6rem 1.1rem",display:"flex",flexDirection:"column",alignItems:"center",minWidth:"90px"}}>
                      <div style={{fontWeight:700,fontSize:"1.4rem",fontFamily:"'Cormorant Garamond',serif",color:col}}>{n}</div>
                      <div style={{fontSize:".72rem",color:col,fontWeight:600,textAlign:"center"}}>{st}</div>
                    </div>);
                  })}
                </div>
                {/* Upcoming deadlines */}
                {upcoming.length>0&&(
                  <div style={{background:"#fff8e6",border:"1.5px solid #c9a84c",borderRadius:"8px",padding:"1rem 1.3rem",marginBottom:"1.5rem"}}>
                    <div style={{fontWeight:700,color:"#8a6a1a",marginBottom:".6rem"}}>⏰ Deadlines in the next 14 days</div>
                    {upcoming.map(c=>{
                      const cl=clientMap[c.clientId];
                      const d=parseDate(c.deadline)||parseDate(c.hearingDate);
                      const daysLeft=Math.ceil((d-today)/(1000*60*60*24));
                      return(
                        <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:".4rem 0",borderBottom:"1px solid #f0e0a0",fontSize:".88rem"}}>

                            <span style={{fontWeight:600,color:"#1c2b3a"}}>{cl?clientName(cl):"Unknown"}</span>

                          </div>
                          <div style={{fontWeight:700,color:daysLeft<=3?"#b03030":"#8a6a1a",whiteSpace:"nowrap"}}>
                            {c.deadline?"📋":"⚖"} {c.deadline||c.hearingDate} <span style={{fontSize:".8rem"}}>({daysLeft}d)</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {immCases.length===0&&(
                  <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>
                    No cases yet. Add a client then create a case to get started.
                  </div>

              </>);
            })()}

            {/* ── CLIENTS ── */}
            {immScreen==="clients"&&(

                  const cases=immCases.filter(x=>x.clientId===c.id);

                    <div key={c.id} className="card tc">
                      <div className="av" style={{background:"#2d3d8a"}}>{(c.firstName||"?").charAt(0).toUpperCase()}</div>
