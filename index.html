                        <div className="tn">{clientName(c)}</div>
                        <div className="tm">📧 {c.email||"No email"} · 📞 {c.phone||"No phone"}</div>
                        <div className="tm">🌍 {c.nationality||"—"} · 🛂 {c.passport||"—"}</div>
                        <div className="tm">📁 {cases.length} case{cases.length!==1?"s":""} · {cases.filter(x=>x.status==="Active").length} active</div>
                        {c.notes&&<div className="tm" style={{fontStyle:"italic",color:"#8a7a5a"}}>📝 {c.notes}</div>}
                      </div>
                      <div style={{display:"flex",gap:".5rem",flexDirection:"column",alignItems:"flex-end"}}>
                        <div style={{display:"flex",gap:".4rem"}}>
                          <button className="btn bo bs" onClick={()=>setEditImmClient({...c})}>Edit</button>
                          <button className="btn bs" style={{background:"#e8f0ff",border:"1.5px solid #2d3d8a",color:"#2d3d8a"}} onClick={()=>{setImmFilterClient(String(c.id));setImmScreen("cases");}}>Cases</button>
                          <button className="btn bd bs" onClick={()=>{if(!window.confirm("Remove this client and all their cases?")) return;setImmClients(immClients.filter(x=>x.id!==c.id));setImmCases(immCases.filter(x=>x.clientId!==c.id));showToast("Client removed.");}}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── CASES ── */}
            {immScreen==="cases"&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:".7rem"}}>
                  <div style={{display:"flex",gap:".6rem",flexWrap:"wrap",alignItems:"center"}}>
                    <select value={immFilterClient} onChange={e=>setImmFilterClient(e.target.value)} style={{width:"auto",padding:".38rem .7rem"}}>
                      <option value="all">All Clients</option>
                      {immClients.map(c=><option key={c.id} value={c.id}>{clientName(c)}</option>)}
                    </select>
                    <select value={immFilterStatus} onChange={e=>setImmFilterStatus(e.target.value)} style={{width:"auto",padding:".38rem .7rem"}}>
                      <option value="all">All Statuses</option>
                      {IMM_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <button className="btn bp" onClick={()=>setEditImmCase({id:null,clientId:immFilterClient!=="all"?Number(immFilterClient):"",caseType:"Visa Application",status:"Active",hoRef:"",deadline:"",hearingDate:"",fixedFee:"",notes:""})}>+ Add Case</button>
                </div>
                {(()=>{
                  const filtered=immCases
                    .filter(c=>immFilterClient==="all"||String(c.clientId)===String(immFilterClient))
                    .filter(c=>immFilterStatus==="all"||c.status===immFilterStatus)
                    .sort((a,b)=>b.id-a.id);
                  if(filtered.length===0) return <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>No cases found.</div>;
                  return filtered.map(c=>{
                    const cl=clientMap[c.clientId];
                    const fns=immFeeNotes.filter(f=>f.caseId===c.id);
                    const paid=fns.filter(f=>f.paid).reduce((s,f)=>s+Number(f.total||0),0);
                    const unpaid=fns.filter(f=>!f.paid).reduce((s,f)=>s+Number(f.total||0),0);
                    return(
                      <div key={c.id} className="card" style={{borderLeft:`3px solid ${{Active:"#2d6a2d","Awaiting Decision":"#c9a84c",Approved:"#1a6a1a",Refused:"#b03030",Appealing:"#6030a0",Closed:"#c5bfb0"}[c.status]||"#c5bfb0"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:".8rem"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:".5rem",flexWrap:"wrap",marginBottom:".3rem"}}>
                              <span style={{fontWeight:700,fontSize:"1rem",color:"#1c2b3a"}}>{cl?clientName(cl):"Unknown Client"}</span>
                              <span className={`status-badge s-${c.status.replace(" ","")}`}>{statusEmoji[c.status]||""} {c.status}</span>
                              <span style={{fontSize:".78rem",color:"#a0b4c5",fontFamily:"monospace"}}>{caseRef(c)}</span>
                            </div>
                            <div style={{fontSize:".85rem",color:"#4a5a68",fontWeight:600}}>{c.caseType}</div>
                            <div style={{fontSize:".82rem",color:"#6b7e8f",marginTop:".25rem"}}>
                              {c.hoRef&&<span>🏛 HO Ref: {c.hoRef} · </span>}
                              {c.deadline&&<span>📋 Deadline: {c.deadline} · </span>}
                              {c.hearingDate&&<span>⚖ Hearing: {c.hearingDate}</span>}
                            </div>
                            {c.notes&&<div style={{fontSize:".82rem",color:"#8a7a5a",fontStyle:"italic",marginTop:".2rem"}}>📝 {c.notes}</div>}
                            <div style={{fontSize:".8rem",color:"#6b7e8f",marginTop:".3rem"}}>
                              {fns.length>0&&<>📄 {fns.length} fee note{fns.length!==1?"s":""} · <span style={{color:"#2d6a2d"}}>£{fmt(paid)} received</span>{unpaid>0&&<span style={{color:"#b03030"}}> · £{fmt(unpaid)} outstanding</span>}</>}
                            </div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:".4rem"}}>
                            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:700,color:"#1c2b3a"}}>£{fmt(c.fixedFee||0)}</div>
                            <div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>
                              <button className="btn bg bs" onClick={()=>openFeeNote(c)}>Issue Fee Note</button>
                              <button className="btn bo bs" onClick={()=>setEditImmCase({...c})}>Edit</button>
                              <button className="btn bd bs" onClick={()=>{if(!window.confirm("Delete this case?")) return;setImmCases(immCases.filter(x=>x.id!==c.id));showToast("Case deleted.");}}>🗑</button>
                            </div>
                            <select value={c.status} onChange={e=>{const upd=immCases.map(x=>x.id===c.id?{...x,status:e.target.value}:x);setImmCases(upd);showToast("Status updated.");}} style={{fontSize:".8rem",padding:".25rem .5rem",width:"auto"}}>
                              {IMM_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            )}

            {/* ── FEE NOTE BUILDER ── */}
            {immScreen==="feenote"&&fnCase&&(()=>{
              const cl=clientMap[fnCase.clientId]||{};
              const disbTotal=fnDisburse.reduce((s,r)=>s+Number(r.amount||0),0);
              const total=Number(fnCase.fixedFee||0)+disbTotal;
              const existingForCase=immFeeNotes.filter(f=>f.caseId===fnCase.id&&f.financialYear===fnFY);
              const fyFnNo=existingForCase.length+1;
              return(
                <div>
                  {/* Ctrl bar */}
                  <div className="ctrl-bar no-print">
                    <button className="btn bo" onClick={()=>setImmScreen("cases")}>← Back</button>
                    <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #c9a84c",borderRadius:"5px",padding:".28rem .7rem"}}>
                      <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#8a6a1a",fontWeight:700}}>FY</span>
                      <select value={fnFY} onChange={e=>setFnFY(e.target.value)} style={{border:"none",background:"transparent",fontSize:".9rem",fontWeight:600,color:"#1c2b3a",cursor:"pointer",padding:0}}>
                        {[new Date().getFullYear()-1,new Date().getFullYear(),new Date().getFullYear()+1].map(y=>{const fy=`${y}/${String(y+1).slice(2)}`;return <option key={fy} value={fy}>{fy}</option>;})}
                      </select>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #ddd8ce",borderRadius:"5px",padding:".28rem .7rem"}}>
                      <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600}}>Date of Issue</span>
                      <input value={fnIssueDate} onChange={e=>setFnIssueDate(e.target.value)} placeholder="DD/MM/YYYY" style={{width:"110px",padding:".25rem .4rem",fontSize:".9rem",border:"1px solid #ddd8ce",borderRadius:"4px"}}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:".4rem",background:"#fff",border:"1.5px solid #ddd8ce",borderRadius:"5px",padding:".28rem .7rem"}}>
                      <span style={{fontSize:".78rem",textTransform:"uppercase",letterSpacing:".06em",color:"#4a5a68",fontWeight:600}}>Payment Due</span>
                      <input value={fnPaymentDue} onChange={e=>setFnPaymentDue(e.target.value)} placeholder="DD/MM/YYYY" style={{width:"110px",padding:".25rem .4rem",fontSize:".9rem",border:"1px solid #ddd8ce",borderRadius:"4px"}}/>
                    </div>
                    <input value={fnMemo} onChange={e=>setFnMemo(e.target.value)} placeholder="📝 Note / memo (optional)..." style={{flex:"1 1 160px",padding:".38rem .7rem",fontSize:".88rem",border:"1.5px solid #ddd8ce",borderRadius:"5px",fontStyle:fnMemo?"normal":"italic"}}/>
                    <button className="btn bg" onClick={issueFeeNote}>✓ Issue Fee Note</button>
                    <button className="btn bp" onClick={()=>window.print()}>🖨 Print / Save PDF</button>
                  </div>

                  <div className="builder-grid">
                    {/* Left panel */}
                    <div className="no-print">
                      <div className="section-box">
                        <h3>Disbursements</h3>
                        <LineItems items={fnDisburse} setItems={setFnDisburse} placeholder="e.g. Home Office fee"/>
                        <div style={{display:"flex",justifyContent:"space-between",padding:".5rem .2rem",fontWeight:600,borderTop:"1px solid #e8e4dc",marginTop:".4rem"}}>
                          <span>Total disbursements</span><span>£{fmt(disbTotal)}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",padding:".3rem .2rem",fontWeight:700,fontFamily:"'Cormorant Garamond',serif",fontSize:"1.05rem"}}>
                          <span>Total due</span><span>£{fmt(total)}</span>
                        </div>
                      </div>
                    </div>

                    {/* Fee note preview */}
                    <div className="fn-page">
                      <div className="fn-top">
                        <div className="fn-top-left">
                          <div className="fn-co">{immFirm.name}</div>
                          <div className="fn-co-sub">
                            {immFirm.address}<br/>
                            <a href={`mailto:${immFirm.email}`}>{immFirm.email}</a>
                            {immFirm.phone&&<> · {immFirm.phone}</>}<br/>
                            IAA Reg: {immFirm.oisc}
                          </div>
                        </div>
                        <div className="fn-top-right">
                          <div className="fn-badge">Fee Note</div>
                        </div>
                      </div>
                      <div className="fn-body">
                        <div className="fn-grid">
                          <div>
                            <div className="fn-sect-label">Fee Note Details</div>
                            <div className="fn-detail">
                              <strong>Financial Year:</strong> {fnFY}<br/>
                              <strong>Fee Note No:</strong> {fyFnNo} <span style={{color:"#a0b4c5",fontSize:".82em"}}>(FY)</span><br/>
                              <strong>Date of Issue:</strong> {fnIssueDate}<br/>
                              {fnPaymentDue&&<><strong>Payment Due:</strong> {fnPaymentDue}<br/></>}
                              <strong>Case Ref:</strong> {caseRef(fnCase)}<br/>
                              <strong>Case Type:</strong> {fnCase.caseType}<br/>
                              {fnCase.hoRef&&<><strong>HO Reference:</strong> {fnCase.hoRef}<br/></>}
                              {fnCase.deadline&&<><strong>Application Deadline:</strong> {fnCase.deadline}<br/></>}
                              {fnCase.hearingDate&&<><strong>Hearing Date:</strong> {fnCase.hearingDate}<br/></>}
                              {fnMemo&&<div className="memo-line" style={{marginTop:".5rem"}}>📝 {fnMemo}</div>}
                            </div>
                          </div>
                          <div>
                            <div className="fn-sect-label">Client Details</div>
                            <div className="fn-detail">
                              <strong>{clientName(cl)}</strong><br/>
                              {cl.address&&<>{cl.address}<br/></>}
                              {cl.email&&<>{cl.email}<br/></>}
                              {cl.phone&&<>{cl.phone}<br/></>}
                              {cl.nationality&&<><strong>Nationality:</strong> {cl.nationality}<br/></>}
                            </div>
                          </div>
                        </div>
                        <table className="fn-table">
                          <thead><tr><th>Description</th><th>Amount</th></tr></thead>
                          <tbody>
                            <tr><td>Professional fees — {fnCase.caseType}</td><td>£{fmt(fnCase.fixedFee||0)}</td></tr>
                            {fnDisburse.filter(r=>r.description||r.amount).map(r=>(
                              <tr key={r.id}><td>{r.description||"—"}</td><td>£{fmt(r.amount)}</td></tr>
                            ))}
                            <tr className="fn-tot"><td><strong>Total Due</strong></td><td><strong>£{fmt(total)}</strong></td></tr>
                          </tbody>
                        </table>
                        <div className="fn-bank">
                          <div className="fn-bank-title">Payment Details</div>
                          <div className="fn-bank-row">
                            <strong>Account Name:</strong> {immFirm.accountName}<br/>
                            <strong>Sort Code:</strong> {immFirm.sortCode}&nbsp;&nbsp;<strong>Account Number:</strong> {immFirm.accountNumber}<br/>
                            <strong>Reference:</strong> {clientName(cl).split(" ").pop().toUpperCase()||caseRef(fnCase)}
                          </div>
                        </div>
                      </div>
                      <div className="fn-footer">
                        <span>{immFirm.name} · IAA Reg: {immFirm.oisc}</span>
                        <span>Fee Note #{fyFnNo} · FY {fnFY}</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ── FEE NOTE RECORDS ── */}
            {immScreen==="records"&&(()=>{
              const filtered=immFeeNotes
                .filter(f=>immFilterClient==="all"||String(f.clientId)===String(immFilterClient))
                .sort((a,b)=>b.fyFnNo-a.fyFnNo);
              const totalPaid=filtered.filter(f=>f.paid).reduce((s,f)=>s+Number(f.total||0),0);
              const totalUnpaid=filtered.filter(f=>!f.paid).reduce((s,f)=>s+Number(f.total||0),0);
              return(<>
                <div style={{display:"flex",gap:".6rem",marginBottom:"1.2rem",alignItems:"center",flexWrap:"wrap"}}>
                  <select value={immFilterClient} onChange={e=>setImmFilterClient(e.target.value)} style={{width:"auto",padding:".38rem .7rem"}}>
                    <option value="all">All Clients</option>
                    {immClients.map(c=><option key={c.id} value={c.id}>{clientName(c)}</option>)}
                  </select>
                </div>
                <div className="sg" style={{gridTemplateColumns:"1fr 1fr",marginBottom:"1.5rem"}}>
                  <div className="st"><div className="sl">Received</div><div className="sv" style={{color:"#2d6a2d"}}>£{fmt(totalPaid)}</div></div>
                  <div className="st"><div className="sl">Outstanding</div><div className="sv" style={{color:"#b03030"}}>£{fmt(totalUnpaid)}</div></div>
                </div>
                {filtered.length===0?(
                  <div className="card" style={{textAlign:"center",color:"#6b7e8f",padding:"3rem"}}>No fee notes issued yet. Open a case and click Issue Fee Note.</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:"8px",overflow:"hidden",boxShadow:"0 1px 8px rgba(28,43,58,.08)",border:"1px solid #e8e4dc"}}>
                    <thead>
                      <tr style={{background:"#1c2b3a"}}>
                        {["FY","#","Client","Case Ref","Type","Issued","Due","Total","Status",""].map(h=>(
                          <th key={h} style={{padding:".7rem 1rem",textAlign:"left",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".07em",color:"#a0b4c5",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((f,idx)=>(
                        <tr key={f.id} style={{borderBottom:"1px solid #f0ece4",background:idx%2===0?"#fff":"#fdfcf9"}}>
                          <td style={{padding:".7rem 1rem",fontSize:".82rem",color:"#8a6a1a",fontWeight:700}}>{f.financialYear||"—"}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".88rem",color:"#6b7e8f",fontWeight:600}}>{f.fyFnNo}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".9rem",color:"#1c2b3a",fontWeight:600}}>{f.clientName}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".82rem",color:"#6b7e8f",fontFamily:"monospace"}}>{f.caseRef}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".82rem",color:"#6b7e8f"}}>{f.caseType}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".82rem",color:"#6b7e8f",whiteSpace:"nowrap"}}>{f.dateIssued}</td>
                          <td style={{padding:".7rem 1rem",fontSize:".82rem",color:f.paymentDue?"#1c2b3a":"#c5bfb0",fontWeight:f.paymentDue?600:400,whiteSpace:"nowrap"}}>{f.paymentDue||"—"}</td>
                          <td style={{padding:".7rem 1rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",fontWeight:700,color:"#1c2b3a",whiteSpace:"nowrap"}}>£{fmt(f.total)}</td>
                          <td style={{padding:".7rem 1rem"}}>
                            {f.paid
                              ?<span className="badge badge-paid">✓ Paid {f.paidDate||""}</span>
                              :<span className="badge badge-overdue">Unpaid</span>
                            }
                          </td>
                          <td style={{padding:".7rem 1rem",whiteSpace:"nowrap"}}>
                            <div style={{display:"flex",gap:".4rem"}}>
                              {!f.paid&&<button className="btn bg bs" onClick={()=>{const upd=immFeeNotes.map(x=>x.id===f.id?{...x,paid:true,paidDate:todayStr()}:x);setImmFeeNotes(upd);showToast("✓ Marked as paid!");}}>Mark Paid</button>}
                              {f.paid&&<button className="btn bo bs" style={{fontSize:".75rem"}} onClick={()=>{const upd=immFeeNotes.map(x=>x.id===f.id?{...x,paid:false,paidDate:null}:x);setImmFeeNotes(upd);}}>Undo</button>}
                              <button className="btn bd bs" style={{fontSize:".75rem"}} onClick={()=>{if(!window.confirm("Delete this fee note?")) return;setImmFeeNotes(immFeeNotes.filter(x=>x.id!==f.id));showToast("Deleted.");}}>🗑</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </>);
            })()}

            {/* ── FIRM SETTINGS ── */}
            {immScreen==="settings"&&(
              <div className="card" style={{maxWidth:"580px"}}>
                <h2 style={{marginBottom:"1.2rem"}}>Immigration Firm Details</h2>
                <div className="fg"><label>Firm Name</label><input value={immFirm.name||""} onChange={e=>setImmFirm({...immFirm,name:e.target.value})}/></div>
                <div className="fg"><label>Address</label><input value={immFirm.address||""} onChange={e=>setImmFirm({...immFirm,address:e.target.value})}/></div>
                <div className="row2">
                  <div className="fg"><label>Email</label><input value={immFirm.email||""} onChange={e=>setImmFirm({...immFirm,email:e.target.value})}/></div>
                  <div className="fg"><label>Phone</label><input value={immFirm.phone||""} onChange={e=>setImmFirm({...immFirm,phone:e.target.value})}/></div>
                </div>
                <div className="fg"><label>IAA Registration Number</label><input value={immFirm.oisc||""} onChange={e=>setImmFirm({...immFirm,oisc:e.target.value})}/></div>
                <hr className="sec"/>
                <h3>Bank Details</h3>
                <div className="row3">
                  <div className="fg"><label>Account Name</label><input value={immFirm.accountName||""} onChange={e=>setImmFirm({...immFirm,accountName:e.target.value})}/></div>
                  <div className="fg"><label>Sort Code</label><input value={immFirm.sortCode||""} onChange={e=>setImmFirm({...immFirm,sortCode:e.target.value})}/></div>
                  <div className="fg"><label>Account Number</label><input value={immFirm.accountNumber||""} onChange={e=>setImmFirm({...immFirm,accountNumber:e.target.value})}/></div>
                </div>
                <button className="btn bp" onClick={()=>showToast("✓ Firm settings saved!")}>Save Settings</button>
              </div>
            )}

            {/* ── CLIENT MODAL ── */}
            {editImmClient&&(
              <div className="mo" onClick={()=>setEditImmClient(null)}>
                <div className="md" onClick={e=>e.stopPropagation()}>
                  <div className="mh">
                    <h2 style={{marginBottom:0}}>{editImmClient.id?"Edit Client":"Add Client"}</h2>
                    <button className="mx" onClick={()=>setEditImmClient(null)}>✕</button>
                  </div>
                  <div className="row2">
                    <div className="fg"><label>First Name *</label><input value={editImmClient.firstName||""} onChange={e=>setEditImmClient({...editImmClient,firstName:e.target.value})} placeholder="e.g. Amara"/></div>
                    <div className="fg"><label>Last Name *</label><input value={editImmClient.lastName||""} onChange={e=>setEditImmClient({...editImmClient,lastName:e.target.value})} placeholder="e.g. Khan"/></div>
                  </div>
                  <div className="row3">
                    <div className="fg"><label>Date of Birth</label><input value={editImmClient.dob||""} onChange={e=>setEditImmClient({...editImmClient,dob:e.target.value})} placeholder="DD/MM/YYYY"/></div>
                    <div className="fg"><label>Nationality</label><input value={editImmClient.nationality||""} onChange={e=>setEditImmClient({...editImmClient,nationality:e.target.value})} placeholder="e.g. Pakistani"/></div>
                    <div className="fg"><label>Passport Number</label><input value={editImmClient.passport||""} onChange={e=>setEditImmClient({...editImmClient,passport:e.target.value})} placeholder="e.g. AA1234567"/></div>
                  </div>
                  <div className="row2">
                    <div className="fg"><label>Email</label><input type="email" value={editImmClient.email||""} onChange={e=>setEditImmClient({...editImmClient,email:e.target.value})} placeholder="client@email.com"/></div>
                    <div className="fg"><label>Phone</label><input value={editImmClient.phone||""} onChange={e=>setEditImmClient({...editImmClient,phone:e.target.value})} placeholder="07xxx xxxxxx"/></div>
                  </div>
                  <div className="fg"><label>Address</label><input value={editImmClient.address||""} onChange={e=>setEditImmClient({...editImmClient,address:e.target.value})} placeholder="Full address"/></div>
                  <div className="fg"><label>Notes</label><textarea value={editImmClient.notes||""} onChange={e=>setEditImmClient({...editImmClient,notes:e.target.value})} rows={2} style={{resize:"vertical"}} placeholder="Any relevant notes..."/></div>
                  <div style={{display:"flex",gap:".8rem",justifyContent:"flex-end",marginTop:".5rem"}}>
                    <button className="btn bo" onClick={()=>setEditImmClient(null)}>Cancel</button>
                    <button className="btn bp" onClick={()=>{
                      if(!editImmClient.firstName&&!editImmClient.lastName){showToast("Client name is required.");return;}
                      let updated;
                      if(editImmClient.id===null){updated=[...immClients,{...editImmClient,id:immNextClientId}];setImmNextClientId(immNextClientId+1);}
                      else updated=immClients.map(c=>c.id===editImmClient.id?editImmClient:c);
                      setImmClients(updated);setEditImmClient(null);showToast("Client saved!");
                    }}>Save Client</button>
                  </div>
                </div>
              </div>
            )}

            {/* ── CASE MODAL ── */}
            {editImmCase&&(
              <div className="mo" onClick={()=>setEditImmCase(null)}>
                <div className="md" onClick={e=>e.stopPropagation()}>
                  <div className="mh">
                    <h2 style={{marginBottom:0}}>{editImmCase.id?"Edit Case":"Add Case"}</h2>
                    <button className="mx" onClick={()=>setEditImmCase(null)}>✕</button>
                  </div>
                  <div className="fg">
                    <label>Client *</label>
                    <select value={editImmCase.clientId||""} onChange={e=>setEditImmCase({...editImmCase,clientId:Number(e.target.value)})}>
                      <option value="">Select client...</option>
                      {immClients.map(c=><option key={c.id} value={c.id}>{clientName(c)}</option>)}
                    </select>
                  </div>
                  <div className="row2">
                    <div className="fg">
                      <label>Case Type *</label>
                      <select value={editImmCase.caseType||"Visa Application"} onChange={e=>setEditImmCase({...editImmCase,caseType:e.target.value})}>
                        {IMM_CASE_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                    <div className="fg">
                      <label>Status</label>
                      <select value={editImmCase.status||"Active"} onChange={e=>setEditImmCase({...editImmCase,status:e.target.value})}>
                        {IMM_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="row2">
                    <div className="fg"><label>Home Office Reference</label><input value={editImmCase.hoRef||""} onChange={e=>setEditImmCase({...editImmCase,hoRef:e.target.value})} placeholder="e.g. UAN1234567"/></div>
                    <div className="fg"><label>Fixed Fee (£) *</label><input type="number" value={editImmCase.fixedFee||""} onChange={e=>setEditImmCase({...editImmCase,fixedFee:e.target.value})} placeholder="e.g. 1500"/></div>
                  </div>
                  <div className="row2">
                    <div className="fg"><label>Application Deadline</label><input value={editImmCase.deadline||""} onChange={e=>setEditImmCase({...editImmCase,deadline:e.target.value})} placeholder="DD/MM/YYYY"/></div>
                    <div className="fg"><label>Hearing Date</label><input value={editImmCase.hearingDate||""} onChange={e=>setEditImmCase({...editImmCase,hearingDate:e.target.value})} placeholder="DD/MM/YYYY"/></div>
                  </div>
                  <div className="fg"><label>Notes</label><textarea value={editImmCase.notes||""} onChange={e=>setEditImmCase({...editImmCase,notes:e.target.value})} rows={2} style={{resize:"vertical"}} placeholder="Case notes, special instructions..."/></div>
                  <div style={{display:"flex",gap:".8rem",justifyContent:"flex-end",marginTop:".5rem"}}>
                    <button className="btn bo" onClick={()=>setEditImmCase(null)}>Cancel</button>
                    <button className="btn bp" onClick={()=>{
                      if(!editImmCase.clientId||!editImmCase.fixedFee){showToast("Client and fee are required.");return;}
                      let updated;
                      if(editImmCase.id===null){
                        const ref=`JA-IMM-${String(immNextCaseId).padStart(4,"0")}`;
                        updated=[...immCases,{...editImmCase,id:immNextCaseId,caseRef:ref,fnNo:1}];
                        setImmNextCaseId(immNextCaseId+1);
                      } else updated=immCases.map(c=>c.id===editImmCase.id?editImmCase:c);
                      setImmCases(updated);setEditImmCase(null);showToast("Case saved!");
                    }}>Save Case</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
